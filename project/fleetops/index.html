<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>B2B Corporate Bakery Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <script>
      // Apply theme before React mounts to avoid a light-to-dark flash.
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = stored === 'dark' || stored === 'light' ? stored : (prefersDark ? 'dark' : 'light');
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();

      // Smart landing page redirect:
      // If user is NOT logged in AND opens the root / path (not /login or /register),
      // redirect them to the landing page so they see the marketing page first.
      (function () {
        try {
          var path = window.location.pathname;
          var hasToken = !!localStorage.getItem('auth_token');
          var isAuthRoute = path === '/login' || path === '/register' || path === '/free-trial'
            || path === '/accept-invite' || path.startsWith('/reset-password/');
          if (!hasToken && !isAuthRoute && (path === '/' || path === '')) {
            window.location.replace('/index-landing.html');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
